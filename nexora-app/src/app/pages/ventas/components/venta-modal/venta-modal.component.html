<h2 mat-dialog-title>
  Nueva Venta
</h2>

<mat-dialog-content>

  <form [formGroup]="ventaForm">

    <mat-form-field appearance="outline">

      <mat-label>Producto</mat-label>

      <mat-select formControlName="productId">

        <mat-option
          *ngFor="let producto of data.productos"
          [value]="producto.id"
        >

          {{ producto.nombre }}

        </mat-option>

      </mat-select>

    </mat-form-field>

    <mat-form-field appearance="outline">

      <mat-label>Cantidad</mat-label>

      <input
        matInput
        type="number"
        formControlName="cantidad"
      >

    </mat-form-field>

  </form>

</mat-dialog-content>

<mat-dialog-actions align="end">

  <button
    mat-button
    mat-dialog-close
  >
    Cancelar
  </button>

  <button
    mat-raised-button
    color="primary"
    (click)="guardar()"
  >
    Guardar
  </button>

</mat-dialog-actions>
