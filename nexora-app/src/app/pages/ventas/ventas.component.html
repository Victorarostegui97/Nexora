<div class="page-header">

  <h1>Ventas</h1>

    <button
    mat-raised-button
    color="primary"
    (click)="abrirVenta()">
        Nueva Venta
    </button>

</div>

<div class="table-card">

  <table
    mat-table
    [dataSource]="ventas"
  >

    <ng-container matColumnDef="fecha">

      <th
        mat-header-cell
        *matHeaderCellDef
      >
        Fecha
      </th>

      <td
        mat-cell
        *matCellDef="let venta"
      >
        {{ venta.fecha | date:'dd/MM/yyyy' }}
      </td>

    </ng-container>

    <ng-container matColumnDef="producto">

      <th
        mat-header-cell
        *matHeaderCellDef
      >
        Producto
      </th>

      <td
        mat-cell
        *matCellDef="let venta"
      >
        {{ venta.producto?.nombre }}
      </td>

    </ng-container>

    <ng-container matColumnDef="estado">

      <th mat-header-cell *matHeaderCellDef>
        Estado
      </th>

      <td mat-cell *matCellDef="let venta">

        <span
          [style.color]="
          venta.estado === 'Anulada' ? 'red' : 'green'"
        >

          {{ venta.estado }}

        </span>

      </td>

    </ng-container>

    <ng-container matColumnDef="cantidad">

      <th
        mat-header-cell
        *matHeaderCellDef
      >
        Cantidad
      </th>

      <td
        mat-cell
        *matCellDef="let venta"
      >
        {{ venta.cantidad }}
      </td>

    </ng-container>

    <ng-container matColumnDef="total">

      <th
        mat-header-cell
        *matHeaderCellDef
      >
        Total
      </th>

      <td
        mat-cell
        *matCellDef="let venta"
      >
        C$ {{ venta.total }}
      </td>

    </ng-container>

    <ng-container matColumnDef="acciones">

      <th mat-header-cell *matHeaderCellDef>
        Acciones
      </th>

      <td mat-cell *matCellDef="let venta">

        <button
          mat-button
          color="warn"
          (click)="anularVenta(venta.id)"
          [disabled]="venta.estado === 'Anulada'"
        >

          Anular Venta

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"
    ></tr>

    <tr
      mat-row
      *matRowDef="
        let row;
        columns: displayedColumns
      "
    ></tr>

  </table>

</div>
