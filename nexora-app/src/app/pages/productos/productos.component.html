<div class="productos-page">

  <div class="header">

    <div>
      <h1>Productos</h1>
      <p>Gestiona el inventario de Nexora</p>
    </div>

    <button
      mat-raised-button
      color="primary"
      (click)="abrirModalProducto()"
    >
      <mat-icon>add</mat-icon>
      Agregar Producto
    </button>

  </div>

  <div class="table-card">

    <mat-form-field appearance="outline" class="search-field">
      <mat-label>Buscar producto</mat-label>

      <input
        matInput
        placeholder="Ej: Afnan"
        (input)="buscarProducto($event)"
      >
    </mat-form-field>

    <table mat-table [dataSource]="productos" class="mat-elevation-z0">

      <!-- Nombre -->
      <ng-container matColumnDef="nombre">
        <th mat-header-cell *matHeaderCellDef> Producto </th>

        <td mat-cell *matCellDef="let producto">
          {{ producto.nombre }}
        </td>
      </ng-container>

      <!-- Stock -->
      <ng-container matColumnDef="stock">
        <th mat-header-cell *matHeaderCellDef> Stock </th>

        <td mat-cell *matCellDef="let producto">
          {{ producto.stock }}
        </td>
      </ng-container>

      <!-- Precio -->
      <ng-container matColumnDef="precio">
        <th mat-header-cell *matHeaderCellDef> Precio </th>

        <td mat-cell *matCellDef="let producto">
          C$ {{ producto.precio }}
        </td>
      </ng-container>

      <!-- Acciones -->
      <ng-container matColumnDef="acciones">
        <th mat-header-cell *matHeaderCellDef> Acciones </th>

        <td mat-cell *matCellDef="let producto; let i = index">

          <button
            mat-icon-button
            color="primary"
            (click)="editarProducto(producto)"
          >
            <mat-icon>edit</mat-icon>
          </button>

          <button
            mat-icon-button
            color="warn"
            (click)="eliminarProducto(producto.id)"
          >
            <mat-icon>delete</mat-icon>
          </button>

        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>

      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

    </table>

    <div
      class="empty-state"
      *ngIf="productos.length === 0"
    >

      <mat-icon>
        inventory_2
      </mat-icon>

      <h3>No hay productos</h3>

      <p>
        Agrega tu primer producto en Nexora
      </p>

    </div>

  </div>

</div>
