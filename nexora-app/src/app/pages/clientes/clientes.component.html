<div class="page-header">

  <h1>Clientes</h1>

  <button
    mat-raised-button
    color="primary"
    (click)="abrirModal()"
  >

    Nuevo Cliente

  </button>

</div>

<div class="table-card">

  <table
    mat-table
    [dataSource]="clientes"
  >

    <ng-container matColumnDef="nombre">

      <th mat-header-cell *matHeaderCellDef>
        Nombre
      </th>

      <td mat-cell *matCellDef="let cliente">
        {{ cliente.nombre }}
      </td>

    </ng-container>

    <ng-container matColumnDef="telefono">

      <th mat-header-cell *matHeaderCellDef>
        Teléfono
      </th>

      <td mat-cell *matCellDef="let cliente">
        {{ cliente.telefono }}
      </td>

    </ng-container>

    <ng-container matColumnDef="correo">

      <th mat-header-cell *matHeaderCellDef>
        Correo
      </th>

      <td mat-cell *matCellDef="let cliente">
        {{ cliente.correo }}
      </td>

    </ng-container>

    <ng-container matColumnDef="direccion">

      <th mat-header-cell *matHeaderCellDef>
        Dirección
      </th>

      <td mat-cell *matCellDef="let cliente">
        {{ cliente.direccion }}
      </td>

    </ng-container>

    <ng-container matColumnDef="acciones">

      <th mat-header-cell *matHeaderCellDef>
        Acciones
      </th>

      <td mat-cell *matCellDef="let cliente">

        <button
          mat-icon-button
          color="primary"
          (click)="abrirModal(cliente)"
        >

          <mat-icon>
            edit
          </mat-icon>

        </button>

        <button
          mat-icon-button
          color="warn"
          (click)="eliminarCliente(cliente.id)"
        >

          <mat-icon>
            delete
          </mat-icon>

        </button>

      </td>

    </ng-container>

    <tr
      mat-header-row
      *matHeaderRowDef="displayedColumns"
    ></tr>

    <tr
      mat-row
      *matRowDef="
        let row;
        columns: displayedColumns
      "
    ></tr>

  </table>

</div>
